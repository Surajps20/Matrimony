<svg width="290" height="60" viewBox="0 0 290 60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&amp;family=Poppins:wght@600&amp;display=swap');
      .logo-title {
        font-family: 'Cinzel', serif;
        font-weight: 700;
        font-size: 17px;
        fill: #9C5478;
      }
      .logo-subtitle {
        font-family: 'Poppins', sans-serif;
        font-weight: 600;
        font-size: 9px;
        fill: #D4AF37;
        letter-spacing: 3px;
      }
    </style>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#BF953F" />
      <stop offset="25%" stop-color="#FCF6BA" />
      <stop offset="50%" stop-color="#B38728" />
      <stop offset="75%" stop-color="#FBF5B7" />
      <stop offset="100%" stop-color="#AA771C" />
    </linearGradient>
    <linearGradient id="pinkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9C5478" />
      <stop offset="100%" stop-color="#FF9193" />
    </linearGradient>
  </defs>
  
  <!-- Intertwined Hearts & Rings / South Indian Traditional Mandap Motif -->
  <g transform="translate(5, 5)">
    <!-- Base decorative ring (Gold) -->
    <circle cx="25" cy="25" r="18" fill="none" stroke="url(#goldGrad)" stroke-width="1.8" />
    <!-- Overlapping ring (Rose-Pink) -->
    <circle cx="35" cy="25" r="15" fill="none" stroke="url(#pinkGrad)" stroke-width="2.2" />
    
    <!-- Stylized Heart in Center -->
    <path d="M 30 18 C 30 14, 23 14, 23 20 C 23 25, 30 29, 30 29 C 30 29, 37 25, 37 20 C 37 14, 30 14, 30 18 Z" fill="url(#pinkGrad)" opacity="0.85" />
    
    <!-- Elegant Gold Crown / South Indian Wedding Accent -->
    <path d="M 25 2 L 27.5 7 L 32.5 6 L 29 10 L 30 15 L 25 12 L 20 15 L 21 10 L 17.5 6 L 22.5 7 Z" fill="url(#goldGrad)" />
  </g>

  <!-- Typography -->
  <text x="65" y="29" class="logo-title">Kalyana Varan</text>
  <text x="65" y="43" class="logo-subtitle">MATRIMONY</text>
</svg>
